name: CI

on:
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npm run prisma:generate

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

  alerta-falla-ci:
    needs: build
    runs-on: ubuntu-latest
    env:
      TRELLO_KEY: ${{ secrets.TRELLO_KEY }}
      TRELLO_TOKEN: ${{ secrets.TRELLO_TOKEN }}
      TRELLO_LIST_ID: ${{ secrets.TRELLO_LIST_ID_CI }}
    if: always()

    steps:
      - name: Sin errores en CI
        if: needs.build.result != 'failure'
        run: echo "CI pasó correctamente, no se crea tarjeta."

      - name: Crear tarjeta Trello por falla en CI
        if: needs.build.result == 'failure'
        run: |
          curl -X POST \
            "https://api.trello.com/1/cards" \
            -d "idList=${TRELLO_LIST_ID}" \
            -d "key=${TRELLO_KEY}" \
            -d "token=${TRELLO_TOKEN}" \
            -d "name=URGENTE: Falla en CI — $(TZ='America/Argentina/Buenos_Aires' date '+%d/%m/%Y %H:%M')" \
            -d "desc=Los tests o el build fallaron en la rama ${{ github.ref_name }}. El código NO llegó a producción."

