name: CI

on:
  push:
    branches: [ main, master, config-git-actions ]
  pull_request:
    branches: [ main, master, config-git-actions ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npm run prisma:generate

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

  notify-trello:
    needs: build
    runs-on: ubuntu-latest
    env:
      TRELLO_KEY: ${{ secrets.TRELLO_KEY }}
      TRELLO_TOKEN: ${{ secrets.TRELLO_TOKEN }}
      TRELLO_LIST_ID: ${{ secrets.TRELLO_LIST_ID }}
    if: always()

    steps:
      - name: Skip Trello notification when build succeeds
        if: needs.build.result != 'failure'
        run: echo "Build succeeded; no Trello card will be created."

      - name: Create Trello card on failure
        if: needs.build.result == 'failure'
        run: |
          curl -X POST \
            "https://api.trello.com/1/cards" \
            -d "idList=${TRELLO_LIST_ID}" \
            -d "key=${TRELLO_KEY}" \
            -d "token=${TRELLO_TOKEN}" \
            -d "name=ALERTA CI: Falló la Integración" \
            -d "desc=El robot detectó un error en los tests o en el build en la rama ${{ github.ref_name }}. El código NO llegó a producción."

  check-production:
    needs: build
    runs-on: ubuntu-latest
    # Este job solo corre si el build/test de CI salió bien
    if: success()
    env:
      TRELLO_KEY: ${{ secrets.TRELLO_KEY }}
      TRELLO_TOKEN: ${{ secrets.TRELLO_TOKEN }}
      TRELLO_LIST_ID: ${{ secrets.TRELLO_LIST_ID }}
    steps:
      - name: Wait for Vercel Deployment
        run: sleep 20

      - name: Check Production URL
        id: check_web
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://cicdtest-nine.vercel.app/api/comments)
          if [ "$STATUS" != "200" ]; then
            echo "Error en producción detectado: $STATUS"
            exit 1
          fi

      - name: Create Trello card on Production Failure
        if: failure()
        run: |
          curl -X POST \
            "https://api.trello.com/1/cards" \
            -d "idList=${TRELLO_LIST_ID}" \
            -d "key=${TRELLO_KEY}" \
            -d "token=${TRELLO_TOKEN}" \
            -d "name=URGENTE: Error en Producción — $(date '+%d/%m/%Y %H:%M')" \
            -d "desc=La web ya está publicada en Vercel pero algo falló en vivo (Status 500 o caída). Commit: ${{ github.sha }}"
